# Continuous integration: build + Prisma checks on every PR and push.
# Deploy stays on Vercel / Railway Git integration unless you add a separate CD workflow.
#
# Tracking: GitHub → Actions tab → each run shows jobs, logs, and (with branch rules) blocks merges if CI fails.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    # Prisma loads env("DATABASE_URL") from schema even for validate/generate; no real DB is contacted.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate (no DB connection)
        run: npx prisma generate

      - run: npm run build

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (placeholder API URL for Next)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.com

  # Optional: uncomment if you want a single “all green” check name for branch protection
  # ci-success:
  #   name: CI
  #   runs-on: ubuntu-latest
  #   needs: [backend, frontend]
  #   steps:
  #     - run: echo "All CI jobs passed"
