name: Platform Deploy Sync

# Frontend deploys from GitHub to Vercel using Vercel's native Git integration.
# Backend deploys from GitHub to Railway using Railway's native Git integration.
# This workflow only handles production database changes for Neon.
#
# Builds on every PR/push: see .github/workflows/ci.yml
#
# Required GitHub secret:
# NEON_DATABASE_URL
#
# Use the direct Neon connection string here for migrations.
# Neon recommends direct connections for schema migrations instead of pooled URLs.

on:
  push:
    branches:
      - main
    paths:
      - "backend/prisma/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Database operation"
        required: true
        default: "db-migrate"
        type: choice
        options:
          - db-migrate
          - db-seed
          - db-migrate-and-seed

jobs:
  neon-db:
    name: Apply Neon Database Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Apply pending migrations
        if: github.event_name == 'push' || github.event.inputs.action == 'db-migrate' || github.event.inputs.action == 'db-migrate-and-seed'
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Seed Neon database
        if: github.event.inputs.action == 'db-seed' || github.event.inputs.action == 'db-migrate-and-seed'
        run: npm run db:seed
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
