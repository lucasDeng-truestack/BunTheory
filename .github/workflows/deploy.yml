name: Deploy to AWS

# Required GitHub repository/environment variables:
# AWS_REGION, ECR_REPOSITORY_BACKEND, ECR_REPOSITORY_FRONTEND, ECS_CLUSTER,
# ECS_SERVICE_BACKEND, ECS_SERVICE_FRONTEND, ECS_TASK_MIGRATIONS, FRONTEND_URL,
# API_URL, PUBLIC_UPLOAD_URL, optionally ECS_ASSIGN_PUBLIC_IP.
#
# Required GitHub secrets:
# AWS_ROLE_ARN, APP_SECRETS_ARN
#
# APP_SECRETS_ARN should reference a Secrets Manager JSON secret containing:
# database_url, jwt_secret, twilio_account_sid, twilio_auth_token,
# twilio_whatsapp_from, admin_whatsapp_number, s3_endpoint, s3_access_key,
# s3_secret_key, s3_bucket, s3_region.

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - "backend/prisma/**"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "Dockerfile.migrations"
      - "scripts/run-prisma-migrations.sh"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - deploy-only
          - backend-only
          - frontend-only
          - db-migrate
          - db-seed
          - db-migrate-and-seed
          - db-reset-and-seed
      skip_migrations:
        description: "Skip auto-migrations (for full deploy only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_REPOSITORY_FRONTEND }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE_BACKEND: ${{ vars.ECS_SERVICE_BACKEND }}
  ECS_SERVICE_FRONTEND: ${{ vars.ECS_SERVICE_FRONTEND }}
  ECS_TASK_MIGRATIONS: ${{ vars.ECS_TASK_MIGRATIONS }}
  ECS_CONTAINER_BACKEND: backend
  ECS_CONTAINER_FRONTEND: frontend
  ECS_CONTAINER_MIGRATIONS: migrations
  ECS_ASSIGN_PUBLIC_IP: ${{ vars.ECS_ASSIGN_PUBLIC_IP || 'DISABLED' }}
  FRONTEND_URL: ${{ vars.FRONTEND_URL }}
  API_URL: ${{ vars.API_URL }}
  PUBLIC_UPLOAD_URL: ${{ vars.PUBLIC_UPLOAD_URL }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.action != 'deploy-only' &&
      github.event.inputs.action != 'db-migrate' &&
      github.event.inputs.action != 'db-seed' &&
      github.event.inputs.action != 'db-migrate-and-seed' &&
      github.event.inputs.action != 'db-reset-and-seed'

    outputs:
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      frontend_changed: ${{ steps.changes.outputs.frontend_changed }}
      migrations_changed: ${{ steps.changes.outputs.migrations_changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        shell: bash
        run: |
          echo "Detecting changed files..."

          if [ "${{ github.event_name }}" = "push" ]; then
            BASE_SHA="${{ github.event.before }}"
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            fi
          else
            git fetch origin main --depth=1
            BASE_SHA=$(git merge-base HEAD origin/main 2>/dev/null || git rev-parse HEAD~1)
          fi

          if [ -z "$BASE_SHA" ]; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD)
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE "^(backend/|backend/Dockerfile|Dockerfile\.migrations|scripts/run-prisma-migrations\.sh)"; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE "^(frontend/|frontend/Dockerfile)"; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE "^(backend/prisma/|Dockerfile\.migrations|scripts/run-prisma-migrations\.sh)"; then
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      always() &&
      (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped') &&
      github.event.inputs.action != 'frontend-only' &&
      github.event.inputs.action != 'db-migrate' &&
      github.event.inputs.action != 'db-seed' &&
      github.event.inputs.action != 'db-migrate-and-seed' &&
      github.event.inputs.action != 'db-reset-and-seed' &&
      (
        github.event.inputs.action == 'backend-only' ||
        github.event.inputs.action == 'full' ||
        github.event.inputs.action == 'deploy-only' ||
        needs.detect-changes.outputs.backend_changed == 'true'
      )

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        if: github.event.inputs.action != 'deploy-only'
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build
        if: github.event.inputs.action != 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve backend image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          BUILT_IMAGE: ${{ steps.build.outputs.image }}
        run: |
          if [ -n "$BUILT_IMAGE" ]; then
            echo "image=$BUILT_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest" >> "$GITHUB_OUTPUT"
          fi

  db-operations:
    name: Database Operations
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() &&
      (
        github.event.inputs.action == 'db-migrate' ||
        github.event.inputs.action == 'db-seed' ||
        github.event.inputs.action == 'db-migrate-and-seed' ||
        github.event.inputs.action == 'db-reset-and-seed' ||
        (
          github.event.inputs.action != 'frontend-only' &&
          github.event.inputs.action != 'deploy-only' &&
          github.event.inputs.skip_migrations != 'true' &&
          needs.detect-changes.outputs.migrations_changed == 'true'
        )
      )

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push migrations image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.migrations \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG-migrations" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest-migrations" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG-migrations"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest-migrations"

      - name: Determine operation type
        id: operation
        shell: bash
        run: |
          ACTION="${{ github.event.inputs.action }}"

          if [ "$ACTION" = "db-migrate" ] || [ "$ACTION" = "db-migrate-and-seed" ] || [ "$ACTION" = "db-reset-and-seed" ] || [ "$ACTION" = "full" ] || [ -z "$ACTION" ]; then
            echo "run_migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_migrations=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$ACTION" = "db-seed" ] || [ "$ACTION" = "db-migrate-and-seed" ] || [ "$ACTION" = "db-reset-and-seed" ]; then
            echo "run_seed=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_seed=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$ACTION" = "db-reset-and-seed" ]; then
            echo "run_reset=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_reset=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run database task
        id: run-db-task
        env:
          RUN_MIGRATIONS: ${{ steps.operation.outputs.run_migrations }}
          RUN_SEED: ${{ steps.operation.outputs.run_seed }}
          RUN_RESET: ${{ steps.operation.outputs.run_reset }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_MIGRATIONS }}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          SUBNETS=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output json)

          SECURITY_GROUPS=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output json)

          OVERRIDES=$(jq -cn \
            --arg container "${{ env.ECS_CONTAINER_MIGRATIONS }}" \
            --arg runMigrations "$RUN_MIGRATIONS" \
            --arg runSeed "$RUN_SEED" \
            --arg runReset "$RUN_RESET" \
            '{
              containerOverrides: [
                {
                  name: $container,
                  environment: [
                    {name: "RUN_MIGRATIONS", value: $runMigrations},
                    {name: "SEED_DATABASE", value: $runSeed},
                    {name: "RESET_DATABASE", value: $runReset}
                  ]
                }
              ]
            }')

          NETWORK_CONFIGURATION=$(jq -cn \
            --argjson subnets "$SUBNETS" \
            --argjson securityGroups "$SECURITY_GROUPS" \
            --arg assignPublicIp "${{ env.ECS_ASSIGN_PUBLIC_IP }}" \
            '{
              awsvpcConfiguration: {
                subnets: $subnets,
                securityGroups: $securityGroups,
                assignPublicIp: $assignPublicIp
              }
            }')

          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIGURATION" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "Failed to start database task."
            exit 1
          fi

          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Wait for database task to complete
        run: |
          TASK_ARN="${{ steps.run-db-task.outputs.task_arn }}"

          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          STOPPED_REASON=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "Database task stopped reason: $STOPPED_REASON"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Database task failed with exit code $EXIT_CODE"
            exit 1
          fi

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [build-backend, db-operations]
    if: |
      always() &&
      needs.build-backend.result == 'success' &&
      (needs.db-operations.result == 'success' || needs.db-operations.result == 'skipped')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current backend task definition
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF" \
            --query taskDefinition > task-definition-backend.json

      - name: Update backend task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-backend.json
          container-name: ${{ env.ECS_CONTAINER_BACKEND }}
          image: ${{ needs.build-backend.outputs.image }}
          environment-variables: |
            PORT=3001
            FRONTEND_URL=${{ env.FRONTEND_URL }}
            PUBLIC_URL=${{ env.PUBLIC_UPLOAD_URL }}
          secrets: |
            DATABASE_URL=${{ secrets.APP_SECRETS_ARN }}:database_url::
            JWT_SECRET=${{ secrets.APP_SECRETS_ARN }}:jwt_secret::
            TWILIO_ACCOUNT_SID=${{ secrets.APP_SECRETS_ARN }}:twilio_account_sid::
            TWILIO_AUTH_TOKEN=${{ secrets.APP_SECRETS_ARN }}:twilio_auth_token::
            TWILIO_WHATSAPP_FROM=${{ secrets.APP_SECRETS_ARN }}:twilio_whatsapp_from::
            ADMIN_WHATSAPP_NUMBER=${{ secrets.APP_SECRETS_ARN }}:admin_whatsapp_number::
            S3_ENDPOINT=${{ secrets.APP_SECRETS_ARN }}:s3_endpoint::
            S3_ACCESS_KEY=${{ secrets.APP_SECRETS_ARN }}:s3_access_key::
            S3_SECRET_KEY=${{ secrets.APP_SECRETS_ARN }}:s3_secret_key::
            S3_BUCKET=${{ secrets.APP_SECRETS_ARN }}:s3_bucket::
            S3_REGION=${{ secrets.APP_SECRETS_ARN }}:s3_region::

      - name: Deploy backend to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BACKEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      always() &&
      (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped') &&
      github.event.inputs.action != 'backend-only' &&
      github.event.inputs.action != 'db-migrate' &&
      github.event.inputs.action != 'db-seed' &&
      github.event.inputs.action != 'db-migrate-and-seed' &&
      github.event.inputs.action != 'db-reset-and-seed' &&
      (
        github.event.inputs.action == 'frontend-only' ||
        github.event.inputs.action == 'full' ||
        github.event.inputs.action == 'deploy-only' ||
        needs.detect-changes.outputs.frontend_changed == 'true'
      )

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        if: github.event.inputs.action != 'deploy-only'
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        id: build
        if: github.event.inputs.action != 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="${{ env.API_URL }}" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          BUILT_IMAGE: ${{ steps.build.outputs.image }}
        run: |
          if [ -n "$BUILT_IMAGE" ]; then
            echo "image=$BUILT_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest" >> "$GITHUB_OUTPUT"
          fi

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: |
      always() &&
      needs.build-frontend.result == 'success'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current frontend task definition
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_FRONTEND }}" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF" \
            --query taskDefinition > task-definition-frontend.json

      - name: Update frontend task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-frontend.json
          container-name: ${{ env.ECS_CONTAINER_FRONTEND }}
          image: ${{ needs.build-frontend.outputs.image }}
          environment-variables: |
            PORT=3000
            HOSTNAME=0.0.0.0
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ env.FRONTEND_URL }}

      - name: Deploy frontend to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_FRONTEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, db-operations, deploy-backend, build-frontend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Action: ${{ github.event.inputs.action || 'auto' }}"
          echo "Backend changed: ${{ needs.detect-changes.outputs.backend_changed || 'n/a' }}"
          echo "Frontend changed: ${{ needs.detect-changes.outputs.frontend_changed || 'n/a' }}"
          echo "Migrations changed: ${{ needs.detect-changes.outputs.migrations_changed || 'n/a' }}"
          echo "Build backend: ${{ needs.build-backend.result }}"
          echo "DB operations: ${{ needs.db-operations.result }}"
          echo "Deploy backend: ${{ needs.deploy-backend.result }}"
          echo "Build frontend: ${{ needs.build-frontend.result }}"
          echo "Deploy frontend: ${{ needs.deploy-frontend.result }}"
