services:
  postgres:
    image: postgres:15
    container_name: bun-theory-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bun_theory
    ports:
      - "5434:5432"
    volumes:
      - bun_theory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bun_theory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bun_theory_pgdata:
